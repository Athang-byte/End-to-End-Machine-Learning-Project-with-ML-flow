<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            background: linear-gradient(to right, #4e73df, #1cc88a);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .result-card {
            margin-top: 100px;
            border-radius: 15px;
            padding: 40px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        footer {
            margin-top: auto;
        }
    </style>
</head>

<body>

<!-- ✅ Navbar / Header -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🍷 Wine Quality Predictor</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/train">Train Model</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ✅ Result Section -->
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="result-card text-center">
                <h2 class="mb-4">Prediction Result</h2>

                <h1 class="text-success">
                    {{ prediction }}
                </h1>

                <p class="mt-3">Wine Quality Score</p>

                <a href="/" class="btn btn-primary mt-4">Try Again</a>
            </div>
        </div>
    </div>
</div>



<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
